<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Mini Task Manager</title>
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#001c39",
                        "on-surface": "#1b1c1a",
                        "primary-fixed": "#ffddb8",
                        "surface-dim": "#dbdad6",
                        "inverse-surface": "#30312e",
                        "background": "#fbf9f5",
                        "surface-container-highest": "#e4e2de",
                        "secondary-container": "#68abff",
                        "on-background": "#1b1c1a",
                        "on-tertiary-fixed-variant": "#891b22",
                        "surface-container-high": "#eae8e4",
                        "primary": "#735a3b",
                        "on-surface-variant": "#4e453c",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdad8",
                        "on-primary-fixed": "#291802",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb3b0",
                        "secondary-fixed-dim": "#a4c9ff",
                        "surface-container": "#efeeea",
                        "tertiary": "#aa3337",
                        "inverse-primary": "#e3c19b",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#e3c19b",
                        "surface": "#fbf9f5",
                        "primary-container": "#c6a682",
                        "secondary-fixed": "#d4e3ff",
                        "surface-variant": "#e4e2de",
                        "on-secondary-container": "#003e73",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#7f121c",
                        "on-tertiary-fixed": "#410006",
                        "on-primary-container": "#523b1f",
                        "outline": "#80756b",
                        "outline-variant": "#d1c4b8",
                        "on-primary-fixed-variant": "#5a4226",
                        "error": "#ba1a1a",
                        "inverse-on-surface": "#f2f0ed",
                        "on-secondary-fixed-variant": "#004883",
                        "on-error": "#ffffff",
                        "surface-bright": "#fbf9f5",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#ff8986",
                        "on-error-container": "#93000a",
                        "secondary": "#0060ac",
                        "surface-container-low": "#f5f3ef",
                        "surface-tint": "#735a3b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        /* Hide scrollbar for clean look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        select.custom-select {
            appearance: none;
            background-color: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen font-body flex overflow-hidden">
    <!-- Main Content Wrapper -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- TopAppBar -->
        <header class="flex justify-between items-center w-full px-8 py-4 bg-[#fbf9f5] z-30 docked full-width top-0">
            <div>
                <span class="text-2xl font-bold tracking-tighter text-[#735a3b] font-headline tracking-tight leading-relaxed">Mini Task Manager</span>
            </div>
            <div class="hidden md:flex flex-1"></div>
        </header>

        <!-- Dashboard Canvas -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-surface">
            <!-- Bento Grid Layout -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 max-w-[1600px] mx-auto">
                
                <!-- Left Column: Categories -->
                <div class="lg:col-span-3 flex flex-col gap-8">
                    <section class="bg-surface-container-low rounded-xl p-6 flex flex-col gap-6" id="categories-manager">
                        <h2 class="font-headline text-lg font-semibold text-primary tracking-tight">Categorías</h2>
                        <form id="add-category-form" class="flex flex-col gap-4">
                            <div class="flex flex-col gap-2">
                                <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-medium">Nueva Categoría</label>
                                <input id="cat-name" required autocomplete="off" class="w-full bg-surface-container-highest border-none rounded-md px-4 py-3 text-sm focus:ring-0 focus:bg-surface-container-lowest transition-all placeholder:text-on-surface-variant/40 shadow-[0_2px_10px_rgba(27,28,26,0.02)]" placeholder="Ej. Diseño..." type="text"/>
                            </div>
                            <div class="flex items-center gap-3 relative">
                                <!-- Color Picker -->
                                <div class="relative w-10 h-10 rounded-full border-2 border-surface flex-shrink-0 cursor-pointer hover:scale-105 transition-transform flex items-center justify-center shadow-sm overflow-hidden" title="Elegir color">
                                    <input type="color" id="cat-color" value="#68abff" class="absolute w-[200%] h-[200%] top-[-50%] left-[-50%] cursor-pointer">
                                </div>
                                <!-- Icon Selector Button -->
                                <div id="icon-selector-btn" class="w-10 h-10 rounded-full border-2 border-surface flex-shrink-0 cursor-pointer hover:scale-105 transition-transform flex items-center justify-center shadow-sm bg-surface-container-highest text-on-surface-variant" title="Elegir ícono">
                                    <span id="selected-icon-display" class="material-symbols-outlined text-[20px]">label</span>
                                </div>
                                
                                <button type="submit" class="flex-1 bg-surface-container-highest hover:bg-surface-container text-primary font-label text-sm font-bold py-2.5 rounded-full transition-colors ml-2">
                                    Añadir
                                </button>

                                <!-- Icon Popover -->
                                <div id="icon-popover" class="hidden absolute top-12 left-0 w-64 bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/20 p-3 z-50">
                                    <div class="text-xs font-label text-on-surface-variant mb-2 ml-1">Seleccionar Símbolo</div>
                                    <div id="icon-grid" class="grid grid-cols-5 gap-2 max-h-48 overflow-y-auto no-scrollbar">
                                        <!-- Icons rendered by JS -->
                                    </div>
                                </div>
                            </div>
                        </form>
                        <!-- Category Tags -->
                        <div id="categories-list" class="flex flex-wrap gap-2 mt-2">
                            <!-- JS Renders chips here -->
                        </div>
                    </section>
                </div>

                <!-- Middle Column: Main Task Area -->
                <div class="lg:col-span-5 flex flex-col gap-8">
                    <!-- Nueva Tarea Input Area -->
                    <section class="glass-panel rounded-xl p-6 shadow-[0_8px_30px_rgba(27,28,26,0.03)] border border-outline-variant/10">
                        <form id="add-task-form" class="flex flex-col gap-5">
                            <input id="task-title" required autocomplete="off" class="w-full bg-transparent border-none text-xl font-headline placeholder:text-on-surface-variant/40 focus:ring-0 px-0 py-2" placeholder="Escribí una nueva tarea..." type="text"/>
                            <div class="flex flex-wrap items-center gap-3">
                                <!-- Category Dropdown -->
                                <div class="relative group cursor-pointer bg-surface-container-high hover:bg-surface-container rounded-md transition-colors">
                                    <select id="task-category" required class="custom-select pl-3 pr-8 py-1.5 text-sm font-medium text-on-surface-variant w-full h-full border-none focus:ring-0">
                                        <option value="" disabled selected>Categoría</option>
                                    </select>
                                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[16px] text-on-surface-variant pointer-events-none">arrow_drop_down</span>
                                </div>
                                <!-- Priority Dropdown -->
                                <div class="relative group cursor-pointer bg-surface-container-high hover:bg-surface-container rounded-md transition-colors">
                                    <select id="task-priority" required class="custom-select pl-8 pr-8 py-1.5 text-sm font-medium text-on-surface-variant w-full h-full border-none focus:ring-0">
                                        <option value="Baja">Baja</option>
                                        <option value="Media" selected>Media</option>
                                        <option value="Alta">Alta</option>
                                    </select>
                                    <span class="material-symbols-outlined absolute left-2 top-1/2 -translate-y-1/2 text-[16px] text-tertiary pointer-events-none">flag</span>
                                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-[16px] text-on-surface-variant pointer-events-none">arrow_drop_down</span>
                                </div>
                                <div class="flex-1"></div>
                                <button type="submit" class="text-on-primary px-5 py-2 rounded-full font-label text-sm font-bold shadow-[0_4px_12px_rgba(115,90,59,0.15)] hover:opacity-90 transition-opacity bg-primary">
                                    Añadir Tarea
                                </button>
                            </div>
                        </form>
                    </section>

                    <!-- Mis Tareas List -->
                    <section id="tasks-container" class="flex flex-col gap-8 mt-4">
                        <!-- JS Renders Active Tasks Here -->
                    </section>
                </div>

                <!-- Right Column: Statistics -->
                <div class="lg:col-span-4 flex flex-col gap-8">
                    <section class="bg-surface-container-low rounded-xl p-6 flex flex-col gap-6">
                        <div class="flex justify-between items-center">
                            <h2 class="font-headline text-lg font-semibold text-primary tracking-tight">Estadísticas</h2>
                        </div>
                        
                        <!-- Summary Cards -->
                        <div class="grid grid-cols-3 gap-4">
                            <div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_2px_10px_rgba(27,28,26,0.02)] flex flex-col gap-1 items-center justify-center text-center">
                                <span class="text-xs font-label uppercase tracking-wider text-on-surface-variant font-medium">Hoy</span>
                                <span id="stat-hoy" class="text-3xl font-headline font-bold text-primary tracking-tighter">0</span>
                            </div>
                            <div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_2px_10px_rgba(27,28,26,0.02)] flex flex-col gap-1 items-center justify-center text-center">
                                <span class="text-xs font-label uppercase tracking-wider text-on-surface-variant font-medium">Semana</span>
                                <span id="stat-semana" class="text-3xl font-headline font-bold text-primary tracking-tighter">0</span>
                            </div>
                            <div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_2px_10px_rgba(27,28,26,0.02)] flex flex-col gap-1 items-center justify-center text-center">
                                <span class="text-xs font-label uppercase tracking-wider text-on-surface-variant font-medium">Mes</span>
                                <span id="stat-mes" class="text-3xl font-headline font-bold text-primary tracking-tighter">0</span>
                            </div>
                        </div>

                        <!-- Completed Tasks List -->
                        <div class="bg-surface-container-lowest rounded-xl border border-outline-variant/20 overflow-hidden mt-2">
                            <div class="w-full flex flex-col p-4">
                                <span class="font-medium text-sm text-on-surface mb-3">Historial de Completadas</span>
                                
                                <!-- Filters -->
                                <div class="flex gap-2 bg-surface-container-high p-1 rounded-lg mb-4">
                                    <button id="filter-btn-hoy" class="flex-1 text-xs font-label font-bold bg-surface-container-lowest text-primary py-1.5 rounded-md shadow-sm filter-btn" data-filter="hoy">Hoy</button>
                                    <button id="filter-btn-semana" class="flex-1 text-xs font-label font-medium text-on-surface-variant py-1.5 hover:text-on-surface transition-colors filter-btn" data-filter="semana">Semana</button>
                                    <button id="filter-btn-mes" class="flex-1 text-xs font-label font-medium text-on-surface-variant py-1.5 hover:text-on-surface transition-colors filter-btn" data-filter="mes">Mes</button>
                                </div>

                                <!-- Category Stats and Tasks Container -->
                                <div id="completed-tasks-container" class="flex flex-col gap-3 max-h-[400px] overflow-y-auto no-scrollbar">
                                    <!-- JS Renders Completed tasks grouped by category here -->
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

            </div>
        </main>
    </div>

    <script src="app.js?v=1"></script>
</body>
</html>
